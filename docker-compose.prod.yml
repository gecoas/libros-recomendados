services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: libros-recomendados:${APP_VERSION:-latest}
    container_name: libros-recomendados-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8096}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_APP_URL=${APP_URL:-https://libros-recomendados.gecoas.es}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
